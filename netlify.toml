[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  # Config JSON files are read directly from disk at runtime (see
  # netlify/lib/config.js) rather than imported, so they must be explicitly
  # included in the function bundle. Adding a new industry/city JSON file
  # requires no change here — it's picked up automatically by the glob.
  included_files = ["src/config/industries/*.json", "src/config/clients/*.json"]

# SPA fallback for client-side routing. Netlify Functions are served from
# /.netlify/functions/* and are matched before this catch-all.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Cache-Control = "no-store"
